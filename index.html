<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบพันธุ์ข้าวไทย</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        .search-box { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .search-box:focus { border-color: #27ae60; }
        .filter-buttons { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { padding: 8px 16px; border: none; border-radius: 20px; background-color: #e0e0e0; cursor: pointer; font-weight: bold; }
        .btn.active, .btn:hover { background-color: #27ae60; color: white; }
        .rice-list { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .rice-list { grid-template-columns: 1fr 1fr; } }
        .rice-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #27ae60; }
        .rice-card.hidden { display: none; }
        .rice-name { font-size: 20px; font-weight: bold; color: #2c3e50; margin: 0 0 5px 0; }
        .badge { display: inline-block; padding: 3px 8px; font-size: 12px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
        .badge-rice { background-color: #e8f5e9; color: #2e7d32; }
        .badge-sticky { background-color: #fff3e0; color: #ef6c00; }
        .rice-detail { font-size: 14px; color: #555; line-height: 1.5; margin-bottom: 10px; }
        .rice-time { font-size: 13px; color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌾 แอปตรวจสอบพันธุ์ข้าวไทย</h1>
    <div class="subtitle">ค้นหาข้อมูลพันธุ์ข้าวที่ชาวนาไทยนิยมปลูกบ่อยที่สุด</div>

    <input type="text" id="searchBar" class="search-box" placeholder="พิมพ์ชื่อพันธุ์ข้าว หรือลักษณะเพื่อค้นหา...">

    <div class="filter-buttons">
        <button class="btn active" onclick="filterRice('all', this)">ทั้งหมด</button>
        <button class="btn" onclick="filterRice('ข้าวเจ้า', this)">ข้าวเจ้า</button>
        <button class="btn" onclick="filterRice('ข้าวเหนียว', this)">ข้าวเหนียว</button>
    </div>

    <div class="rice-list" id="riceList"></div>
</div>

<script>
    const riceData = [
        { name: "ขาวดอกมะลิ 105", type: "ข้าวเจ้า", detail: "ราชาข้าวหอมไทย หอมนุ่ม ทนแล้ง ทนเค็มได้ดี นิยมปลูกมากในภาคอีสาน", time: "ไวต่อช่วงแสง (เก็บเกี่ยวช่วง พ.ย.)" },
        { name: "กข15", type: "ข้าวเจ้า", detail: "หอมนุ่มเหมือนมะลิ 105 แต่เก็บเกี่ยวได้เร็วกว่า หนีน้ำท่วมช่วงปลายปีได้ดี", time: "ไวต่อช่วงแสง (เก็บเกี่ยวช่วง ต.ค.)" },
        { name: "กข43", type: "ข้าวเจ้า", detail: "ข้าวเพื่อสุขภาพ ดัชนีน้ำตาลปานกลางค่อนข้างต่ำ นุ่ม ทานง่าย เหมาะกับคนคุมน้ำตาล", time: "ไม่ไวต่อช่วงแสง (ประมาณ 95 วัน)" },
        { name: "กข79", type: "ข้าวเจ้า", detail: "ข้าวพื้นนุ่ม ผลผลิตสูง ต้านทานเพลี้ยกระโดดสีน้ำตาลได้ดี เหมาะกับพื้นที่ภาคกลาง", time: "ไม่ไวต่อช่วงแสง (ประมาณ 115-120 วัน)" },
        { name: "กข87", type: "ข้าวเจ้า", detail: "ข้าวพื้นนุ่มมาก ได้รับความนิยมสูงในภาคกลาง เมล็ดเรียวยาว ผลผลิตต่อไร่สูง", time: "ไม่ไวต่อช่วงแสง (ประมาณ 110-115 วัน)" },
        { name: "หอมปทุม (ปทุมธานี 1)", type: "ข้าวเจ้า", detail: "ข้าวหอมนุ่มคล้ายมะลิ แต่ปลูกได้ตลอดทั้งปี (นาปรัง) ทานอร่อยตอนหุงสุกใหม่ๆ", time: "ไม่ไวต่อช่วงแสง (ประมาณ 110-125 วัน)" },
        { name: "กข6", type: "ข้าวเหนียว", detail: "ข้าวเหนียวยอดนิยมอันดับ 1 นุ่ม เมล็ดเรียวยาว มีกลิ่นหอม ต้านทานโรคไหม้ได้ดี", time: "ไวต่อช่วงแสง (เก็บเกี่ยวช่วง พ.ย.)" },
        { name: "กข22", type: "ข้าวเหนียว", detail: "พัฒนาเพื่อต้านทานโรคไหม้และขอบใบแห้งได้ดีกว่า กข6 ลำต้นแข็งแรงไม่ล้มง่าย", time: "ไวต่อช่วงแสง (เก็บเกี่ยวช่วง พ.ย.)" },
        { name: "สันป่าตอง 1", type: "ข้าวเหนียว", detail: "ข้าวเหนียวนาปรังยอดนิยม ปลูกได้ตลอดปี ผลผลิตสูง เมล็ดใหญ่ แปรรูปทำขนมดีมาก", time: "ไม่ไวต่อช่วงแสง (ประมาณ 130-135 วัน)" },
        { name: "กข18", type: "ข้าวเหนียว", detail: "ปรับปรุงพันธุ์มาจาก กข6 เพื่อให้ทนทานต่อโรคไหม้คอรวง แต่คงความนุ่มหอมเช่นเดิม", time: "ไวต่อช่วงแสง (เก็บเกี่ยวช่วง พ.ย.)" },
        { name: "เขี้ยวงู", type: "ข้าวเหนียว", detail: "ข้าวพันธุ์พื้นเมือง เมล็ดเล็ก เรียวยาว สวยงาม นิยมนำไปทำข้าวเหนียวมูน หุงแล้วไม่เละ", time: "ไวต่อช่วงแสง (เก็บเกี่ยวช่วง พ.ย.)" },
        { name: "กข41", type: "ข้าวเจ้า", detail: "ข้าวพื้นแข็ง ผลผลิตสูงมาก ต้านทานเพลี้ยกระโดดและโรคขอบใบแห้งได้ดีมาก", time: "ไม่ไวต่อช่วงแสง (ประมาณ 105 วัน)" },
        { name: "กข57", type: "ข้าวเจ้า", detail: "ข้าวพื้นแข็ง แข็งแรง ทนร้อน ทนหนาว ผลผลิตเสถียร โรงสีชอบซื้อไปทำข้าวสารส่งออก", time: "ไม่ไวต่อช่วงแสง (ประมาณ 110 วัน)" },
        { name: "กข85", type: "ข้าวเจ้า", detail: "ข้าวพื้นแข็ง ผลผลิตต่อไร่สูงมาก (ทะลุ 100 ถังได้ง่าย) เมล็ดเรียวยาว ทนอากาศเย็นได้ดี", time: "ไม่ไวต่อช่วงแสง (ประมาณ 115 วัน)" },
        { name: "ชัยนาท 1", type: "ข้าวเจ้า", detail: "ข้าวพันธุ์อึด ทนโรค ทนแมลง ปลูกง่าย เป็นขวัญใจชาวนาภาคกลางมาอย่างยาวนาน", time: "ไม่ไวต่อช่วงแสง (ประมาณ 120 วัน)" },
        { name: "สุพรรณบุรี 1", type: "ข้าวเจ้า", detail: "แตกรวงดี ผลผลิตสูง เมล็ดเลื่อมมัน นำไปแปรรูปเป็นเส้นหมี่ ขนมจีน หรือแป้งข้าวเจ้าได้ดี", time: "ไม่ไวต่อช่วงแสง (ประมาณ 120 วัน)" },
        { name: "ไรซ์เบอร์รี (Riceberry)", type: "ข้าวเจ้า", detail: "ข้าวสีม่วงเข้มอมดำ เมล็ดเรียวยาว สารต้านอนุมูลอิสระสูงมาก ตลาดคนรักสุขภาพต้องการสูง", time: "ไม่ไวต่อช่วงแสง (ประมาณ 130 วัน)" },
        { name: "หอมนิล", type: "ข้าวเจ้า", detail: "ต้นตำรับข้าวสีม่วงดำ เมล็ดข้าวมีกลิ่นหอม มีธาตุเหล็กและวิตามินบีสูง", time: "ไม่ไวต่อช่วงแสง (ประมาณ 125 วัน)" },
        { name: "สังข์หยดพัทลุง", type: "ข้าวเจ้า", detail: "ข้าวพื้นเมืองภาคใต้ เมล็ดเล็ก สีแดง ข้าวนุ่ม เคี้ยวมัน มีคุณค่าทางอาหารและกากใยสูงมาก", time: "ไวต่อช่วงแสง (เก็บเกี่ยวช่วง ธ.ค.)" },
        { name: "ทับทิมชุมแพ", type: "ข้าวเจ้า", detail: "ข้าวสีแดง ทนแล้งได้ดี หุงสุกแล้วนุ่ม ไม่แข็งกระด้างเหมือนข้าวแดงทั่วไป", time: "ไม่ไวต่อช่วงแสง (ประมาณ 130 วัน)" }
    ];

    const riceListDiv = document.getElementById('riceList');
    const searchBar = document.getElementById('searchBar');
    let currentFilter = 'all';

    function displayRice() {
        riceListDiv.innerHTML = '';
        riceData.forEach(rice => {
            const badgeClass = rice.type === 'ข้าวเจ้า' ? 'badge-rice' : 'badge-sticky';
            const card = document.createElement('div');
            card.className = 'rice-card';
            card.setAttribute('data-type', rice.type);
            card.innerHTML = `
                <div class="rice-name">${rice.name}</div>
                <span class="badge ${badgeClass}">${rice.type}</span>
                <div class="rice-detail">${rice.detail}</div>
                <div class="rice-time">📅 อายุเก็บเกี่ยว: ${rice.time}</div>
            `;
            riceListDiv.appendChild(card);
        });
    }

    searchBar.addEventListener('input', (e) => {
        const searchText = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.rice-card');
        cards.forEach(card => {
            const name = card.querySelector('.rice-name').innerText.toLowerCase();
            const detail = card.querySelector('.rice-detail').innerText.toLowerCase();
            const type = card.getAttribute('data-type');
            const matchesSearch = name.includes(searchText) || detail.includes(searchText);
            const matchesFilter = currentFilter === 'all' || type === currentFilter;
            if (matchesSearch && matchesFilter) { card.classList.remove('hidden'); } else { card.classList.add('hidden'); }
        });
    });

    function filterRice(type, button) {
        currentFilter = type;
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        searchBar.dispatchEvent(new Event('input'));
    }
    displayRice();
</script>
</body>
</html>
